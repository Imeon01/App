<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SmartWaterPlant</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <header>
    <h1>💧 SmartWaterPlant</h1>
   
  </header>
	<div class="camera">
	<button id="switchToCameraBtn" class="icon-btn"> Pflanze anlegen</button>
	</div>

  <!-- DASHBOARD -->
  <main id="dashboardView">
    <div class="plant-selector">
      <label> Meine Pflanze:</label>
      <select id="plantSelect">
        <option value="pflanze1">Pflanze 1</option>
      </select>
    </div>

    <div class="sensor-grid">
      <!-- Bodenfeuchtigkeit -->
      <div class="sensor-card" data-sensor="moisture">
        <h3>Bodenfeuchtigkeit</h3>
        <div class="value" id="moistureValue">-- %</div>
      </div>
      <!-- Temperatur (vertikal zentriert) -->
      <div class="sensor-card temp-card" data-sensor="temperature">
        <h3>Temperatur</h3>
        <div class="value vertical-center" id="tempValue">-- °C</div>
      </div>
      <!-- Luftfeuchtigkeit -->
      <div class="sensor-card" data-sensor="humidity">
        <h3>Luftfeuchtigkeit</h3>
        <div class="value" id="humidityValue">-- %</div>
      </div>
      <!-- Licht -->
      <div class="sensor-card" data-sensor="light">
        <h3>Licht</h3>
        <div class="value" id="lightValue">-- lx</div>
      </div>
    </div>

    <!-- Nächstes gießen (ohne Zusatztext) -->
    <div class="ki-card">
	<p>
      <h3>Nächstes gießen</h3>
      <p id="kiRecommendation">Lade Empfehlung...</p>
	 </p>
      <div class="last-watering">
        Letzte Bewässerung: <span id="lastWatering">---</span>
      </div>
      <button id="waterNowBtn" class="water-btn">Jetzt gießen</button>
    </div>
  </main>

  <!-- KAMERA-ANSICHT -->
  <main id="cameraView" style="display: none;">
    <h2>Neue Pflanze anlegen</h2>
    <div class="camera-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display: none;"></canvas>
      <button id="captureBtn">Foto aufnehmen</button>
    </div>
    <div id="preview"></div>
    <input type="text" id="plantName" placeholder="Pflanzenname" value="Kartoffel" />
    <button id="savePlantBtn">Pflanze speichern</button>
    <button id="backToDashboardBtn" class="secondary">← Zurück</button>
  </main>

  <footer>
    <span>Letzte Aktualisierung: <span id="lastUpdate">--:--:--</span></span>
  </footer>
</div>

<!-- MODAL FÜR GRAPH (stündlich) -->
<div id="graphModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h3 id="modalTitle">Historische Werte (stündlich)</h3>
    <canvas id="historyChart" width="400" height="300"></canvas>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
